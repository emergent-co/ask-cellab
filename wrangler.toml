# 셀렙(이머전트) 접수 사이트 — Cloudflare Pages 설정
name = "ask-cellab"
compatibility_date = "2025-05-01"
pages_build_output_dir = "."

# D1 데이터베이스 (접수 데이터 저장)
[[d1_databases]]
binding = "DB"
database_name = "ask-cellab-db"
database_id = "여기에_D1_데이터베이스_ID_입력"

# R2 버킷 (사진·영상 첨부 저장)
[[r2_buckets]]
binding = "FILES"
bucket_name = "ask-cellab-files"

# 아래 시크릿은 wrangler.toml에 넣지 말고 Cloudflare 대시보드에서 설정하세요:
#   ADMIN_PASSWORD  — 관리자 페이지 비밀번호
#   ADMIN_EMAIL     — 접수 알림 수신 이메일 (emgt.yhlee@gmail.com)
#   RESEND_API_KEY  — Resend API 키
#   MAIL_FROM       — 발신 이메일 주소 (도메인 인증 전에는 onboarding@resend.dev)
